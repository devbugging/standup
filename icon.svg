      <stop offset="0%" style="stop-color:#4A90FF"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <g transform="translate(64,58)" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mic body -->
    <rect x="-12" y="-28" width="24" height="40" rx="12" fill="white" stroke="none"/>
    <!-- Mic arc -->
    <path d="M-20,8 A20,20 0 0,0 20,8"/>
    <!-- Mic stem -->
    <line x1="0" y1="28" x2="0" y2="38"/>
    <line x1="-10" y1="38" x2="10" y2="38"/>
  </g>
  <!-- Small waveform dots -->
  <g fill="white" opacity="0.5">
    <circle cx="30" cy="30" r="3"/>
    <circle cx="98" cy="30" r="3"/>
    <circle cx="24" cy="42" r="2"/>
    <circle cx="104" cy="42" r="2"/>
