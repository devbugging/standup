name: DailyStandup
options:
  bundleIdPrefix: com.dailystandup
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  DailyStandup:
    type: application
    platform: macOS
    sources:
      - DailyStandup
    settings:
      base:
        INFOPLIST_FILE: DailyStandup/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: DailyStandup/Resources/DailyStandup.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.dailystandup.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
